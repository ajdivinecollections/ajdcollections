<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AJ Divine Collections | Premium Handbags</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

:root{
--accent:#d4af37;
}

body{
background:#f5f5f7;
}

/* HEADER */
header{
background:#111;
color:white;
padding:15px 8%;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
z-index:1000;
}

.brand{
display:flex;
align-items:center;
gap:10px;
}

.brand img{
height:45px;
}

.brand-text h1{
font-size:18px;
line-height:1.1;
}

.brand-text span{
font-size:13px;
color:var(--accent);
letter-spacing:2px;
}

/* PRODUCTS */
.products{
padding:70px 8%;
text-align:center;
}

.product-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:30px;
margin-top:30px;
}

.product{
background:white;
padding:20px;
border-radius:16px;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
transition:.3s;
}

.product:hover{
transform:translateY(-6px);
}

/* IMAGE GALLERY */
.product-images{
position:relative;
overflow:hidden;
}

.main-img{
width:100%;
height:260px;
object-fit:cover;
border-radius:12px;
transition:transform .4s ease;
cursor:pointer;
}

.product-images:hover .main-img{
transform:scale(1.2);
}

.thumbs{
display:flex;
gap:8px;
margin-top:10px;
justify-content:center;
}

.thumbs img{
width:60px;
height:60px;
object-fit:cover;
border-radius:6px;
cursor:pointer;
opacity:.7;
}

.thumbs img.active{
border:2px solid var(--accent);
opacity:1;
}

/* PRICE */
.price{
color:var(--accent);
font-weight:600;
margin:10px 0;
}

.whatsapp-btn{
display:inline-block;
padding:10px 18px;
background:#25D366;
color:white;
border-radius:6px;
text-decoration:none;
}

/* LIGHTBOX */
.lightbox{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.95);
justify-content:center;
align-items:center;
z-index:2000;
}

.lightbox img{
max-width:85%;
max-height:85%;
}

.lightbox .close{
position:absolute;
top:20px;
right:30px;
color:white;
font-size:35px;
cursor:pointer;
}

.arrow{
position:absolute;
top:50%;
transform:translateY(-50%);
font-size:40px;
color:white;
cursor:pointer;
padding:10px;
}

.arrow.left{ left:30px; }
.arrow.right{ right:30px; }

</style>
</head>

<body>

<header>
<div class="brand">
<img src="images/logo.png">
<div class="brand-text">
<h1>AJ<br>Divine</h1>
<span>COLLECTIONS</span>
</div>
</div>
</header>

<section class="products">
<h2>Featured Products</h2>

<div class="product-grid">

<!-- PRODUCT 1 -->
<div class="product">
<div class="product-images"
data-images='["images/ck-front1.jpeg","images/ck-front2.jpeg","images/ck-back.jpeg"]'>

<img class="main-img" src="images/ck-front1.jpeg">

<div class="thumbs">
<img src="images/ck-front1.jpeg">
<img src="images/ck-front2.jpeg">
<img src="images/ck-back.jpeg">
</div>
</div>

<h3>CK Premium Handbag</h3>
<p class="price">₹699</p>
<a class="whatsapp-btn" href="https://wa.me/919390186232">Order on WhatsApp</a>
</div>

<!-- PRODUCT 2 -->
<div class="product">
<div class="product-images"
data-images='["images/zara-black.jpeg","images/zara-black2.jpeg","images/zara-black3.jpeg"]'>

<img class="main-img" src="images/zara-black.jpeg">

<div class="thumbs">
<img src="images/zara-black.jpeg">
<img src="images/zara-black2.jpeg">
<img src="images/zara-black3.jpeg">
</div>
</div>

<h3>ZARA Premium Handbag</h3>
<p class="price">₹799</p>
<a class="whatsapp-btn" href="https://wa.me/919390186232">Order on WhatsApp</a>
</div>

</div>
</section>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
<span class="close" onclick="closeLightbox()">×</span>
<span class="arrow left" onclick="prevImage()">❮</span>
<img id="lightbox-img">
<span class="arrow right" onclick="nextImage()">❯</span>
</div>

<script>
let currentImages=[];
let currentIndex=0;

document.querySelectorAll(".product-images").forEach(gallery=>{
const mainImg=gallery.querySelector(".main-img");
const thumbs=gallery.querySelectorAll(".thumbs img");

thumbs.forEach((thumb,i)=>{
thumb.addEventListener("click",()=>{
mainImg.src=thumb.src;
thumbs.forEach(t=>t.classList.remove("active"));
thumb.classList.add("active");
});
});

mainImg.addEventListener("click",()=>{
currentImages=JSON.parse(gallery.dataset.images);
currentIndex=currentImages.indexOf(mainImg.src.split('/').pop());
if(currentIndex===-1) currentIndex=0;
openLightbox(currentImages[currentIndex]);
});
});

function openLightbox(src){
document.getElementById("lightbox").style.display="flex";
document.getElementById("lightbox-img").src=src;
}

function closeLightbox(){
document.getElementById("lightbox").style.display="none";
}

function nextImage(){
currentIndex=(currentIndex+1)%currentImages.length;
document.getElementById("lightbox-img").src=currentImages[currentIndex];
}

function prevImage(){
currentIndex=(currentIndex-1+currentImages.length)%currentImages.length;
document.getElementById("lightbox-img").src=currentImages[currentIndex];
}

/* Swipe support */
let startX=0;
document.getElementById("lightbox").addEventListener("touchstart",e=>{
startX=e.touches[0].clientX;
});

document.getElementById("lightbox").addEventListener("touchend",e=>{
let endX=e.changedTouches[0].clientX;
if(startX-endX>50) nextImage();
if(endX-startX>50) prevImage();
});
</script>

</body>
</html>
